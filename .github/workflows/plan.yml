name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/plan.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan-management:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true

      - name: Terraform Init (Management)
        run: cd terraform/environments/management && terraform init -no-color
        continue-on-error: true

      - name: Terraform Plan (Management)
        run: cd terraform/environments/management && terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment PR with plan (Management)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📋 **Terraform Plan - Management Account**\n\n⚠️ Plan output requires AWS credentials. See workflow logs for details.\n\n**Next steps:**\n1. Review plan\n2. Ensure SCPs are correct\n3. Approve PR for apply'
            })

  plan-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true

      - name: Terraform Init (Security)
        run: cd terraform/environments/security && terraform init -no-color
        continue-on-error: true

      - name: Terraform Plan (Security)
        run: cd terraform/environments/security && terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment PR with plan (Security)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📋 **Terraform Plan - Security Account**\n\n⚠️ Plan output requires AWS credentials. See workflow logs for details.\n\n**Resources to be created:**\n- CloudTrail organization trail\n- Security Hub aggregator\n- GuardDuty detector\n- IAM Identity Center permission sets\n- SNS topics for alerts'
            })
